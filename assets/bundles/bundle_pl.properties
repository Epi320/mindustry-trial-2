block.conduit.name = Rura
block.conduit.fulldescription = Podstawowy blok transportu cieczy. DziaГ…вҖҡa jak przenoГ…вҖәnik, tylko Г…Вјe z pГ…вҖҡynami. Najlepiej stosowaГ„вҖЎ z pompami bГ„вҖҰdГ…Вә razem innymi rurami.\nMoГ…Вјe byГ„вҖЎ uГ…Вјywany jako pomost nad pГ…вҖҡynami dla wrogГғВіw i graczy.
block.pulseconduit.name = Rura impulsowa
block.pulseconduit.fulldescription = Zaawansowany blok transportu cieczy. Transportuje ciecze szybciej i przechowuje wiГ„в„ўcej niГ…Вј rury standardowe.
block.liquidrouter.name = Rozdzielacz pГ…вҖҡynГғВіw
block.liquidrouter.fulldescription = DziaГ…вҖҡa podobnie do zwykГ…вҖҡego rozdzielacza. Akceptuje wejГ…вҖәcie cieczy z jednej strony i przekazuje jГ„вҖҰ na pozostaГ…вҖҡe strony. Przydatny do rozdzielania cieczy z jednej rury do wielu.
block.conveyor.name = PrzenoГ…вҖәnik
