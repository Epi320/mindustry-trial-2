tutorial.intro.text = [yellow]Witamy w poradniku do gry.[]\nAby rozpoczГ„вҖҰГ„вҖЎ, naciГ…вҖәnij "Dalej".
tutorial.moveDesktop.text = Aby siГ„в„ў poruszaГ„вҖЎ, uГ…Вјyj klawiszy [orange]W A S[] oraz [orange]D[]. Przytrzymaj [orange]shift[], aby przyГ…вҖәpieszyГ„вҖЎ.\nPrzytrzymujГ„вҖҰc [orange]ctrl[] podczas krГ„в„ўcenia [orange]rolkГ„вҖҰ myszy[] moГ…Вјesz zmieniaГ„вҖЎ poziom przybliГ…Вјenia mapy.
tutorial.shoot.text = Do celowania uГ…Вјywasz kursora myszy.\n[orange]Lewy przycisk myszy[] sГ…вҖҡuГ…Вјy do strzelania. PoГ„вҖЎwicz na [yellow]celu[].
tutorial.moveAndroid.text = Aby przesunГ„вҖҰГ„вҖЎ widok, przeciГ„вҖҰgnij jednym palcem po ekranie. Г…ЕЎciГ…вҖәnij i przeciГ„вҖҰgnij, aby powiГ„в„ўkszyГ„вҖЎ lub pomniejszyГ„вҖЎ.
tutorial.placeSelect.text = Wybierz [yellow]przenoГ…вҖәnik[] z menu blokowego w prawym dolnym rogu.
tutorial.placeConveyorDesktop.text = UГ…Вјyj [orange]rolki myszy[] aby obrГғВіciГ„вҖЎ przenoГ…вҖәnik [orange]do przodu[], a nastГ„в„ўpnie umieГ…вҖәГ„вҖЎ go w [yellow]oznaczonym miejscu[] za pomocГ„вҖҰ [orange]lewego przycisku myszy[].
tutorial.placeConveyorAndroid.text = UГ…Вјyj [orange]przycisk obracania[], aby obrГғВіciГ„вҖЎ przenoГ…вҖәnik [orange]do przodu[]. Jednym palcem przeciГ„вҖҰgnij go na [yellow]wskazanГ„вҖҰ pozycjГ„в„ў[], a nastГ„в„ўpnie umieГ…вҖәГ„вҖЎ go za pomocГ„вҖҰ [orange]znacznika wyboru[].
tutorial.placeConveyorAndroidInfo.text = MoГ…Вјesz teГ…Вј nacisnГ„вҖҰГ„вҖЎ ikonГ„в„ў celownika w lewym dolnym rogu, aby przeГ…вҖҡГ„вҖҰczyГ„вҖЎ na [pomaraГ…вҖһczowy] [[tryb dotykowy] [] i umieГ…вҖәciГ„вҖЎ bloki, dotykajГ„вҖҰc ekranu. W trybie dotykowym bloki moГ…Вјna obracaГ„вҖЎ strzaГ…вҖҡkГ„вҖҰ w lewym dolnym rogu. NaciГ…вҖәnij [Г…ВјГғВіГ…вҖҡty] nastГ„в„ўpny [], aby go wyprГғВіbowaГ„вҖЎ.
tutorial.placeDrill.text = Teraz wybierz i umieГ…вҖәГ„вҖЎ [yellow]wiertГ…вҖҡo do kamienia[] w oznaczonym miejscu.
tutorial.blockInfo.text = JeГ…вҖәli chcesz siГ„в„ў dowiedzieГ„вҖЎ wiГ„в„ўcej na temat wybranego bloku, kliknij [orange]znak zapytania[] w prawym gГғВіrnym rogu, aby przeczytaГ„вҖЎ jego opis.
tutorial.deselectDesktop.text = MoГ…Вјesz anulowaГ„вҖЎ wybГғВіr bloku za pomocГ„вҖҰ [orange]prawego przycisku myszy[].
tutorial.deselectAndroid.text = MoГ…Вјesz odznaczyГ„вҖЎ blok, naciskajГ„вҖҰc przycisk [orange]X[].
tutorial.drillPlaced.text = WiertГ…вҖҡo bГ„в„ўdzie teraz produkowaГ„вҖЎ [yellow]kamieГ…вҖһ[] i podawaГ„вҖЎ go na przenoГ…вҖәnik, ktГғВіry przeniesie go do [yellow]rdzenia[]
tutorial.drillInfo.text = RГғВіГ…Вјne rudy wymagajГ„вҖҰ rГғВіГ…Вјnych wierteГ…вҖҡ. KamieГ…вҖһ wymaga wiertГ…вҖҡa do kamieniu, Г…Вјelazo wymaga wiertГ…вҖҡa do Г…Вјelaza, itd.
tutorial.drillPlaced2.text = Przeniesienie przedmiotГғВіw do rdzenia powoduje umieszczenie ich w [yellow]inwentarzu przedmiotГғВіw[] w lewym gГғВіrnym rogu. Stawianie blokГғВіw te przedmioty zuГ…Вјywa.
tutorial.moreDrills.text = MoГ…Вјesz poГ…вҖҡГ„вҖҰczyГ„вҖЎ wiertГ…вҖҡa i przenoГ…вҖәnikГғВіw w przedstawiony sposГғВіb:
tutorial.deleteBlock.text = MoГ…Вјesz usuwaГ„вҖЎ bloki, klikajГ„вҖҰc [orange]prawy przycisk myszy[] na bloku, ktГғВіry chcesz usunГ„вҖҰГ„вҖЎ.\nSprГғВіbuj usunГ„вҖҰГ„вҖЎ [yellow]oznaczony[] przenoГ…вҖәnik.
tutorial.deleteBlockAndroid.text = MoГ…Вјesz usuwaГ„вҖЎ bloki za pomocГ„вҖҰ [orange]krzyГ…Вјyka[] w [orange]menu przerywania[] w lewym dolnym rogu i stukajГ„вҖҰc w blok.\nSprГғВіbuj usunГ„вҖҰГ„вҖЎ [yellow]oznaczony[] przenoГ…вҖәnik.
tutorial.placeTurret.text = Teraz wybierz i umieГ…вҖәГ„вҖЎ [yellow]dziaГ…вҖҡko[] w [yellow]zaznaczonym miejscu[].
tutorial.placedTurretAmmo.text = DziaГ…вҖҡko przyjmie teraz [yellow]amunicjГ„в„ў[] z przenoГ…вҖәnika. MoГ…Вјesz zobaczyГ„вҖЎ, ile ma amunicji, najeГ…ВјdГ…ВјajГ„вҖҰc na dziaГ…вҖҡko kursorem i sprawdzajГ„вҖҰc [green]zielony pasek[].
tutorial.turretExplanation.text = WieГ…Вјyczki bГ„в„ўdГ„вҖҰ strzelaГ„вҖЎ automatycznie do najbliГ…Вјszego wroga w zasiГ„в„ўgu, o ile bГ„в„ўdГ„вҖҰ miaГ…вҖҡy wystarczajГ„вҖҰcГ„вҖҰ iloГ…вҖәГ„вҖЎ amunicji.
tutorial.waves.text = Co kaГ…Вјde [yellow]60[] sekund, fala [coral]wrogГғВіw[] pojawi siГ„в„ў w okreГ…вҖәlonym miejscu na mapie i sprГғВіbuje zniszczyГ„вҖЎ rdzeГ…вҖһ.
tutorial.coreDestruction.text = Twoim celem jest [yellow]obrona rdzenia[]. Zniszczenie rdzenia jest rГғВіwnoznaczne z [coral]przegranГ„вҖҰ[].
tutorial.pausingDesktop.text = JeГ…вҖәli chcesz zrobiГ„вҖЎ przerwГ„в„ў, naciГ…вҖәnij [orange]spacjГ„в„ў[] lub [orange]przycisk pauzy[] w lewym gГғВіrnym rogu. Nadal moГ…Вјesz wybieraГ„вҖЎ i wstawiaГ„вҖЎ klocki podczas pauzy, ale nie moГ…Вјesz niszczyГ„вҖЎ i strzelaГ„вҖЎ.
tutorial.pausingAndroid.text = JeГ…вҖәli chcesz zrobiГ„вҖЎ przerwГ„в„ў, naciГ…вҖәnij [orange]przycisk pauzy[]. Nadal moГ…Вјesz stawiaГ„вҖЎ i niszczyГ„вҖЎ bloki.
tutorial.purchaseWeapons.text = MoГ…Вјesz kupiГ„вҖЎ nowe [Г…ВјГғВіГ…вҖҡte] bronie [] dla swojego mecha, otwierajГ„вҖҰc menu aktualizacji w lewym dolnym rogu.
tutorial.switchWeapons.text = ZmieГ…вҖһ broГ…вҖһ, klikajГ„вҖҰc jej ikonГ„в„ў w lewym dolnym rogu lub uГ…ВјywajГ„вҖҰc cyfr [orange][1-9[].
tutorial.spawnWave.text = Fala wrogГғВіw nadchodzi! Zniszcz ich.
tutorial.pumpDesc.text = W pГғВіГ…Вәniejszych falach moГ…Вјe byГ„вҖЎ konieczne uГ…Вјycie [yellow]pompy[] do rozprowadzania cieczy dla generatorГғВіw lub ekstraktorГғВіw.
tutorial.pumpPlace.text = Pompy dziaГ…вҖҡajГ„вҖҰ podobnie do wierteГ…вҖҡ, z tym wyjГ„вҖҰtkiem, Г…Вјe wytwarzajГ„вҖҰ ciecze zamiast rГғВіd.\nSprГғВіbuj umieГ…вҖәciГ„вҖЎ pompГ„в„ў na [yellow]oleju[].
tutorial.conduitUse.text = Teraz umieГ…вҖәГ„вҖЎ [orange]rurГ„в„ў[] wychodzГ„вҖҰcГ„вҖҰ od pompy.
tutorial.conduitUse2.text = I tak jeszcze jednГ„вҖҰ...
tutorial.conduitUse3.text = I jeszcze jedenГ„вҖҰ...
tutorial.generator.text = Teraz umieГ…вҖәГ„вҖЎ [orange]generator spalinowy[] na koГ…вҖһcu kanaГ…вҖҡu.
tutorial.generatorExplain.text = Generator ten bГ„в„ўdzie teraz wytwarzaГ„вҖЎ [yellow]energiГ„в„ў[] z oleju.
tutorial.lasers.text = Energia jest dystrybuowana za pomocГ„вҖҰ [yellow]przekaГ…ВәnikГғВіw[]. UmieГ…вҖәГ„вҖЎ takowy przekaГ…Вәnik na [yellow]wskazanej pozycji[].
tutorial.laserExplain.text = Generator przeniesie teraz moc do przekaГ…Вәnika. WiГ„вҖҰzka [orange]nieprzeГ…Вәroczysta[] oznacza, Г…Вјe ГўвӮ¬вҖ№ГўвӮ¬вҖ№aktualnie transmituje moc. WiГ„вҖҰzka [yellow]przeГ…Вәroczysta[] wskazuje na brak przekazywanej energii.
tutorial.laserMore.text = MoГ…Вјesz sprawdziГ„вҖЎ ile energii przechowuje blok najeГ…ВјdГ…ВјajГ„вҖҰc na niego kursorem i sprawdzajГ„вҖҰc [yellow]Г…ВјГғВіГ…вҖҡty pasek[].
tutorial.healingTurret.text = Energia moГ…Вјe byГ„вҖЎ uГ…Вјywany do zasilania [lime]wieГ…Вј naprawczych[]. UmieГ…вҖәГ„вҖЎ takowГ„вҖҰ [yellow]tutaj[].
tutorial.healingTurretExplain.text = DopГғВіki dostarczana jest do niej energia bГ„в„ўdzie [lime]naprawiaГ„вҖЎ pobliskie bloki[]. Podczas gry ustawiГ…вҖҡeГ…вҖә jГ„вҖҰ niedaleko swojej bazy tak szybko, jak to tylko moГ…Вјliwe!
tutorial.smeltery.text = Wiele blokГғВіw wymaga do pracy [orange]stali[], ktГғВіrГ„вҖҰ moГ…Вјna wytwarzaГ„вҖЎ w  [orange]hucie[]. A skoro tak, to postaw jГ„вҖҰ teraz.
tutorial.smelterySetup.text = Huta wytworzy teraz z Г…Вјelaza [orange]stal[], wykorzystujГ„вҖҰc wГ„в„ўgiel jako paliwo.
tutorial.tunnelExplain.text = ZwrГғВіГ„вҖЎ teГ…Вј uwagГ„в„ў, Г…Вјe przedmioty przechodzГ„вҖҰ przez [orange]tunel[] i wynurzajГ„вҖҰ siГ„в„ў po drugiej stronie, przechodzГ„вҖҰc przez kamienny blok. PamiГ„в„ўtaj, Г…Вјe tunele mogГ„вҖҰ przechodziГ„вҖЎ tylko do 2 blokГғВіw.
tutorial.end.text = I na tym poradnik siГ„в„ў koГ…вҖһczy!\nPozostaje tylko Г…ВјyczyГ„вҖЎ Ci [orange]powodzenia[]!
