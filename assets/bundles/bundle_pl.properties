block.titaniumshieldwall.fulldescription = Silny blok obronny z dodatkowГ„вҖҰ wbudowanГ„вҖҰ tarczГ„вҖҰ. Wymaga zasilania. UГ…Вјywa energii do pochГ…вҖҡaniania pociskГғВіw wroga. W celu dostarczenia zasilania zaleca siГ„в„ў stosowanie wzmacniaczy energii.
