tutorial.intro.text = [gelb] Willkommen zum Tutorial [] Um zu beginnen, drÃ¼cke 'weiter'.
tutorial.moveDesktop.text = Verwende zum Verschieben die Tasten [orange] [[WASD] []. Halte [orange] Shift [] gedrÃ¼ckt, um zu erhÃ¶hen. Halte [orange] CTRL/STRG [] gedrÃ¼ckt, wÃ¤hrend du das [orange] Scrollrad [] zum VergrÃ¶ssern oder Verkleinern verwendest.
tutorial.shoot.text = Ziele mit der Maus, halte die [orange] linke Maustaste [] gedrÃ¼ckt, um zu schiessen. Versuche es mit dem [gelben] Ziel [].
tutorial.moveAndroid.text = Um die Ansicht zu verschieben, ziehe einen Finger Ã¼ber den Bildschirm. DrÃ¼cke und ziehe, um zu vergrÃ¶ssern oder zu verkleinern.
tutorial.placeSelect.text = Versuche, ein [gelbes] FÃ¶rderband [] aus dem BlockmenÃ¼ unten rechts auszuwÃ¤hlen.
tutorial.placeConveyorDesktop.text = Verwende das [orange] [[scrollwheel] [], um das FÃ¶rderband nach vorne zu bewegen [orange] vorwÃ¤rts [], und platziere es dann an der [gelben] markierten Stelle [] mit [orange] [[linke Maustaste] [].
tutorial.placeConveyorAndroid.text = Verwende die [orange] [[rotieren-Taste] [], um das FÃ¶rderband nach vorne [orange] zu drehen [], ziehe es mit einem Finger in Position und platziere es dann an der [gelben] markierten Stelle [] mit der [Orange] [[HÃ¤kchen][].
tutorial.placeConveyorAndroidInfo.text = Alternativ kannst du das Fadenkreuzsymbol unten links drÃ¼cken, um zum [orange] [[touch mode] [] zu wechseln, und BlÃ¶cke durch Tippen auf den Bildschirm platzieren. Im Touch-Modus kÃ¶nnen BlÃ¶cke mit dem Pfeil unten links gedreht werden. DrÃ¼cke [gelb] neben [], um es auszuprobieren.
tutorial.placeDrill.text = WÃ¤hle nun einen [gelben] Steinbohrer [] an der markierten Stelle aus und platziere ihn.
tutorial.blockInfo.text = Wenn du mehr Ã¼ber einen Block erfahren mÃ¶chtest, tippe oben rechts auf das [orange] Fragezeichen [], um dessen Beschreibung zu lesen.
tutorial.deselectDesktop.text = Du kannst einen Block mit [Orange] [[Rechte Maustaste] [] abwÃ¤hlen.
tutorial.deselectAndroid.text = Du kannst einen Block abwÃ¤hlen, indem du die [orange] X [] -Taste drÃ¼cken.
tutorial.drillPlaced.text = Der Bohrer erzeugt nun [gelben] Stein, [] gib den Stein nun auf das FÃ¶rderband aus und bewege ihn dann in den [gelben] Kern [].
tutorial.drillInfo.text = Verschiedene Erze benÃ¶tigen unterschiedliche Bohrer. Stein erfordert Steinbohrer, Eisen erfordert Eisenbohrer usw.
tutorial.drillPlaced2.text = Wenn du GegenstÃ¤nde in den Kern verschiebst, steckst du sie in dein [gelbes] Inventar [] oben links. Das Platzieren von BlÃ¶cken verwendet GegenstÃ¤nde aus deinem Inventar.
tutorial.moreDrills.text = Du kannst so viele Bohrer und FÃ¶rderer miteinander verbinden wie du lust hast.
tutorial.deleteBlock.text = Du kannst BlÃ¶cke lÃ¶schen, indem du mit der [orange] rechte Maustaste [] auf dem Block klickst, den du lÃ¶schen mÃ¶chtest. Versuche, dieses FÃ¶rderband zu lÃ¶schen.
tutorial.deleteBlockAndroid.text = Du kannst BlÃ¶cke lÃ¶schen, indem du [orange] das Fadenkreuz [] im [orange] PausenmodusmenÃ¼ [] links unten auswÃ¤hlst und auf einen Block tippst. Versuche, dieses Fliessband zu lÃ¶schen.
tutorial.placeTurret.text = WÃ¤hle nun einen [gelben] Turm [] an der [gelben] markierten Stelle [] und platziere ihn.
tutorial.placedTurretAmmo.text = Dieser Turm nimmt nun [gelbe] Munition [] vom FÃ¶rderband an. Du kannst sehen, wie viel Munition es hat, indem du darÃ¼ber schweben und den [grÃ¼nen] grÃ¼nen Balken [] prÃ¼fen.
tutorial.turretExplanation.text = GeschÃ¼tze schiessen automatisch auf den nÃ¤chsten Feind in Reichweite, solange sie genug Munition haben.
tutorial.waves.text = Jede [yellow] 60 [] Sekunden wird eine Welle von [coral] Feinden [] an einem bestimmten Orten erscheinen und versuchen, den Kern zu zerstÃ¶ren.
tutorial.coreDestruction.text = Dein Ziel ist es, den Kern [yellow] zu verteidigen. Wenn der Kern zerstÃ¶rt wird, verlierst du [coral] das Spiel [].
tutorial.pausingDesktop.text = Wenn du jemals eine Pause machen mÃ¶chtest, drÃ¼cke die [orange] Pause-Taste [] oben links oder [orange]space[], um das Spiel anzuhalten. Du kannst auch BlÃ¶cke immer noch auswÃ¤hlen und platzieren, wÃ¤hrend du das Spiel pausiert ist, aber Sie kÃ¶nnen sich nicht bewegen oder schiessen.
tutorial.pausingAndroid.text = Wenn du jemals eine Pause machen willst, drÃ¼ck einfach die [orange] Pause-Taste [] oben links, um das Spiel anzuhalten. Sie kÃ¶nnen immer noch Sachen auswÃ¤hlen und BlÃ¶cke wÃ¤hrend der Pause platzieren.
tutorial.purchaseWeapons.text = Du kannst neue [yellow] Waffen [] fÃ¼r deinen Mech kaufen, indem du das Verbesserungs-MenÃ¼ unten links Ã¶ffnest.
tutorial.switchWeapons.text = Schalte Waffen, indem du entweder auf das Symbol unten links klickst oder Nummern verwendest [orange] [[1-9] [].
tutorial.spawnWave.text = Hier kommt die erste Welle. ZerstÃ¶re sie.
tutorial.pumpDesc.text = In spÃ¤teren Wellen mÃ¼sst du mÃ¶glicherweise [yellow] Pumpen [] verwenden, um FlÃ¼ssigkeiten fÃ¼r Generatoren oder Extraktoren zu verteilen.
tutorial.pumpPlace.text = Pumpen arbeiten Ã¤hnlich wie Bohrer, ausser dass sie anstelle von GegenstÃ¤nden FlÃ¼ssigkeiten produzieren. Versuch mal, eine Pumpe auf das [yellow] gekennzeichnete Ã–l [] zu setzen.
tutorial.conduitUse.text = Stellen Sie nun eine [orange] Leitungsrohr [] von der Pumpe weg.
tutorial.conduitUse2.text = Und noch ein paar mehr ...
tutorial.conduitUse3.text = Und noch ein paar mehr ...
tutorial.generator.text = Stellen Sie nun einen [orange] Verbrennungsgenerator [] Block am Ende des Leitungsrohres auf.
tutorial.generatorExplain.text = Dieser Generator erzeugt nun [yellow] Energie [] aus dem Ã–l.
tutorial.lasers.text = Die Energie wird mit [yellow] Energielasern [] verteilt. Drehe und platziere einen hier.
tutorial.laserExplain.text = Der Generator wird nun Energie in den Laserblock bewegen. Ein [yellow] undurchsichtiger [] Strahl bedeutet, dass er gerade Leistung Ã¼bertrÃ¤gt, und ein [yellow] transparenter [] Strahl bedeutet, dass dies nicht der Fall ist.
tutorial.laserMore.text = Du kannst Ã¼berprÃ¼fen, wie viel Energie ein Block hat, indem du darÃ¼ber schweben und den [yellow] gelben Balken [] oben prÃ¼fen.
tutorial.healingTurret.text = Dieser Laser kann verwendet werden, um einen [lime] -ReparaturgeschÃ¼tz [] anzutreiben. Platziere einen hier.
tutorial.healingTurretExplain.text = Solange er Kraft hat, repariert dieser Turm in der NÃ¤he BlÃ¶cke. [] Wenn du spielst, stelle sicher, dass du so schnell wie mÃ¶glich einen in deiner Basis bekommst!
tutorial.smeltery.text = Viele BlÃ¶cke benÃ¶tigen [orange] Stahl [], um eine [orange] Schmelzer [] herzustellen. Platziere einen hier.
tutorial.smelterySetup.text = Diese Schmelzer wird nun [orange] Stahl [] aus dem Eingangs-Eisen produzieren, wobei Kohle als Brennstoff verwendet wird.
tutorial.tunnelExplain.text = Also note that the items are going through a [orange]tunnel block[] and emerging on the other side, going through the stone block. Keep in mind that tunnels can only go through up to 2 blocks.
tutorial.end.text = Und damit ist das Tutorial abgeschlossen! Viel GlÃ¼ck!
