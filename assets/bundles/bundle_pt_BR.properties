tutorial.intro.text = [yellow]Bem-vindo ao tutorial.[] Para comeГѓВ§ar aperte 'prГѓВіximo'.
tutorial.moveDesktop.text = Para mover, use as teclas [orange][[WASD][]. Segure [orange]shift[] para mover rГѓВЎpido. Segure [orange]CTRL[] enquanto usa a [orange]roda do mouse[] para aumentar ou diminuir o zoom.
tutorial.shoot.text = Use your mouse to aim,  hold [orange]left mouse button[] to shoot. Try practicing on the [yellow]target[].
tutorial.moveAndroid.text = Para arrastar a visГѓВЈo, passe um dedo pela tela. Pince com os dedos para aumentar ou diminuir o zoom.
tutorial.placeSelect.text = Tente selecionar uma [yellow]esteira[] do menu de blocos no canto inferior direito.
tutorial.placeConveyorDesktop.text = Use a [orange][[roda do mouse][] para girar a esteira atГѓВ© que aponte [orange]para frente[], entГѓВЈo coloque-a no [yellow]local marcado[]  usando o [orange][[botГѓВЈo esquerdo do mouse][].
tutorial.placeConveyorAndroid.text = Use o [orange][[botГѓВЈo de girar][] para girar a esteira para que aponte [orange]para frente[], arraste-a para a posiГѓВ§ГѓВЈo e entГѓВЈo coloque-a na [yellow]posiГѓВ§ГѓВЈo marcada[] usando o [orange][[botГѓВЈo de confirmaГѓВ§ГѓВЈo][].
tutorial.placeConveyorAndroidInfo.text = VocГѓВЄ tambГѓВ©m pode apertar no ГѓВ­cone com uma cruz no canto inferior esquerdo para alterar para o [orange][[modo de toque][], e colocar blocos apertando na tela. No modo de toque, blocos podem ser girados com a seta no canto inferior esquerdo. Aperte [yellow]prГѓВіximo[] para tentar.
tutorial.placeDrill.text = Agora selecione e coloque uma [yellow]broca de pedra[] no local marcado.
tutorial.blockInfo.text = Se quiser saber mais sobre os blocos, vocГѓВЄ pode apertar o [orange]sГѓВ­mbolo de interrogaГѓВ§ГѓВЈo[] no canto superior direito para ler mais.
tutorial.deselectDesktop.text = VocГѓВЄ pode cancelar a seleГѓВ§ГѓВЈo de um bloco usando o [orange][botГѓВЈo direito do mouse[].
tutorial.deselectAndroid.text = ocГѓВЄ pode cancelar a seleГѓВ§ГѓВЈo de um bloco apertando o botГѓВЈo [orange]X[].
tutorial.drillPlaced.text = A broca produzirГѓВЎ [yellow]pedra[], direcionando o produzido para a esteira a qual moverГѓВЎ a pedra para o [yellow]nГѓВєcleo[].
tutorial.drillInfo.text = MinГѓВ©rios diferentes precisam de diferentes brocas. Pedra precisam de brocas de pedra, Ferro de brocas de ferro, etc.
tutorial.drillPlaced2.text = Itens movidos para o nГѓВєcleo sГѓВЈo colocados em seu [yellow]inventГѓВЎrio[], no canto superior esquerdo. Colocar blocos gasta os recursos do inventГѓВЎrio.
tutorial.moreDrills.text = VocГѓВЄ pode conectar vГѓВЎrias brocas e esteiras, veja.
tutorial.deleteBlock.text = VocГѓВЄ pode excluir blocos clickando com o [orange]botГѓВЈo direito do mouse[] no bloco que quiser destruir. Tente excluir esta esteira.
tutorial.deleteBlockAndroid.text = VocГѓВЄ pode excluir blocos [orange]apertando na cruz[] no [orange]menu modo de quebra[] no canto inferior esquerdo e entГѓВЈo apertando no bloco desejado. Tente excluir esta esteira.
tutorial.placeTurret.text = Agora, selecione e construa uma [yellow]torre[] no [yellow]local marcado[].
tutorial.placedTurretAmmo.text = Esta torre aceitarГѓВЎ [yellow]muniГѓВ§ГѓВЈo[] da esteira. VocГѓВЄ pode ver quanta muniГѓВ§ГѓВЈo elas tem passando o mouse sobre elas e verificando a [green]barra verde[].
tutorial.turretExplanation.text = As torres irГѓВЈo atirar no inimigo mais prГѓВіximo que estiver ao alcance, contanto que tenham muniГѓВ§ГѓВЈo suficiente.
tutorial.waves.text = A cada [yellow]60[] segundos, uma horda de [coral]inimigos[] irГѓВЎ aparecer em locais especГѓВ­ficos e tentarГѓВЎ destruir o nГѓВєcleo.
tutorial.coreDestruction.text = Seu objetivo ГѓВ© [yellow]defender o nГѓВєcleo[]. Se o nГѓВєcleo for destruГѓВ­do, vecГѓВЄ [coral]perde o jogo[].
tutorial.pausingDesktop.text = Se vocГѓВЄ precisar parar por alguns instantes, aperte o [orange]botГѓВЈo de pausa[] no canto superior esquerdo ou [orange]barra de espaГѓВ§o[] para pausar o jogo. VocГѓВЄ pode colocar blocos enquanto o jogo esta pausado, porГѓВ©m nГѓВЈo poderГѓВЎ se mover ou atirar.
tutorial.pausingAndroid.text = Se vocГѓВЄ precisar parar por alguns instantes, aperte o [orange]botГѓВЈo de pausa[] no canto superior esquerdo ou [orange]barra de espaГѓВ§o[] para pausar o jogo. VocГѓВЄ pode colocar blocos enquanto o jogo esta pausado.
tutorial.purchaseWeapons.text = VocГѓВЄ pode comprar novas [yellow]armas[] para seu mecha, basta abrir o menu de melhorias no canto inferior esquerdo.
tutorial.switchWeapons.text = Alterne entre suas armas clickando em seu ГѓВ­cone ou usando as teclas numГѓВ©ricas [orange][[1-9][].
tutorial.spawnWave.text = Uma horda esta vindo. DestrГѓВєa-os.
tutorial.pumpDesc.text = Em hordas mais avanГѓВ§adas, vocГѓВЄ talvez precise de [yellow]bombas[] para distribuir lГѓВ­quidos para geradores ou extratores.
tutorial.pumpPlace.text = Bombas trabalham de forma semelhante ГѓВ s brocas, porГѓВ©m elas produzem lГѓВ­quidos ao envГѓВ©s de minГѓВ©rios. Tente colocar uma bomba na [yellow]cГѓВ©lula de petrГѓВіleo designada[].
tutorial.conduitUse.text = Agora coloque um [orange]cano[] levando para longe da bomba.
tutorial.conduitUse2.text = E mais alguns...
tutorial.conduitUse3.text = E mais alguns...
tutorial.generator.text = Agora coloque um [orange]gerador a combustГѓВЈo[] no final do cano.
tutorial.generatorExplain.text = Este gerador irГѓВЎ produzir [yellow]energia[] do petrГѓВіleo.
tutorial.lasers.text = Energia ГѓВ© distribuida usando [yellow]lasers[]. Gire e coloque um aqui.
tutorial.laserExplain.text = O gerador irГѓВЎ mover energia para o bloco do laser. Um feixe [yellow]opaco[] significa que a energia estГѓВЎ sendo transmitida, e um feixe [yellow]transparente[] significa que nГѓВЈo.
tutorial.laserMore.text = VocГѓВЄ pode verificar quanta energia um bloco tem ao passar o mouse sobre eles e verificando a [yellow]barra amarela[] no topo.
tutorial.healingTurret.text = Este laser pode ser usado para energizar uma [lime]torre de reparo[]. Coloque uma aqui.
tutorial.healingTurretExplain.text = Enquanto tiver energia, esta torre irГѓВЎ [lime]reparar blocos prГѓВіximos.[] Quando jogar, tenha certeza de construir uma dessas prГѓВіximas do nГѓВєcleo o mais rГѓВЎpido possГѓВ­vel!
